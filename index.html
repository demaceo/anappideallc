<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!--
      Theme bootstrap — runs synchronously before paint to set
      data-theme on <html>, preventing a flash of the wrong theme on
      hydration. Reads localStorage first, then falls back to the OS
      color-scheme preference. Mirrors the theme list in src/lib/theme.tsx.
    -->
    <script>
      (function () {
        try {
          var ALLOWED = ['modern-vibrant', 'classic', 'pastel', 'arcade-neon'];
          var saved = localStorage.getItem('theme');
          var initial =
            saved && ALLOWED.indexOf(saved) > -1
              ? saved
              : matchMedia('(prefers-color-scheme: dark)').matches
                ? 'arcade-neon'
                : 'modern-vibrant';
          document.documentElement.dataset.theme = initial;
        } catch (e) {
          document.documentElement.dataset.theme = 'modern-vibrant';
        }
      })();
    </script>

    <title>An App Idea LLC — Got an app idea? Let's build it.</title>
    <meta
      name="description"
      content="Solo dev studio in Denver helping founders ship mobile apps and websites — from interface to database to launch."
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
