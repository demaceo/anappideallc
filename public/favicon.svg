<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32" role="img" aria-label="An App Idea">
  <title>An App Idea</title>
  <!-- ink ground -->
  <rect width="32" height="32" rx="6" fill="#0f0e0c"/>
  <!-- gold top rule (echoes body border-top) -->
  <rect x="7" y="6.5" width="18" height="1.2" fill="#b8860b"/>
  <!-- chevron / stylized A, split 30/70 gold->accent -->
  <!-- left gold limb -->
  <path d="M16 11 L9 24 L12.4 24 L16 16.6 Z" fill="#b8860b"/>
  <!-- right accent limb -->
  <path d="M16 11 L23 24 L19.6 24 L16 16.6 Z" fill="#c0392b"/>
  <!-- crossbar of the A, in paper, tying the two limbs -->
  <rect x="12.9" y="19.4" width="6.2" height="1.7" fill="#f5f0e8"/>
</svg>